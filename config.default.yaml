# copilot-relay configuration
#
# This file is copied to ~/.copilot-relay/config.yaml on first start.
# Edit the user config file, not this template, for local changes.
# Most values hot-reload while the service is running. host and port still
# require restart because the listening socket is already bound.

# Local host for the Claude Code-compatible HTTP server.
host: 127.0.0.1

# Local port for the HTTP server.
port: 4142

# GitHub Copilot API base URL.
# Keep this default unless you know your Copilot tenant uses a custom endpoint.
copilotBaseUrl: https://api.githubcopilot.com

# When true, start updates ~/.claude/settings.json with ANTHROPIC_BASE_URL
# and a dummy ANTHROPIC_AUTH_TOKEN so Claude Code can use this proxy.
claudeSetup: true

# Log verbosity:
#   error - startup/preflight/request failures only
#   info  - error logs plus startup status, preflight status, and local HTTP
#           status codes
#   debug - info logs plus model routing summaries, Copilot upstream timings,
#           and request payloads
# Any other value is invalid and stops startup.
logLevel: info

# Number of days to keep files in ~/.copilot-relay/logs.
logRetentionDays: 3

# Default upstream thinking/reasoning effort sent to Copilot.
# Valid values: none, low, medium, high, xhigh.
thinkEffort: xhigh

# Copilot model used for bridge-managed Claude WebSearch.
# Leave empty to use gptModel.
webSearchBackend:

# Model routing: requests containing "opus" use opusModel; all others use gptModel.
#
# Upstream Copilot model used for non-Opus requests.
gptModel: gpt-5.5

# Upstream Copilot model used for requests containing "opus".
opusModel: claude-opus-4.8
