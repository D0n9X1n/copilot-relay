name: Bug report
description: Report a reproducible copilot-relay problem.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not paste tokens, full debug logs, or private prompts.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: copilot-relay fails to...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact steps to reproduce the issue.
      placeholder: |
        1. Run `copilot-relay start`
        2. Send a Claude Code request...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: timestamp
    attributes:
      label: Approximate timestamp
      description: When did the failure happen? Include timezone if possible.
      placeholder: "2026-06-06 01:23:45 PDT"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: copilot-relay version
      placeholder: "0.0.1"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Config
      description: Paste `~/.copilot-relay/config.yaml` with private endpoints removed if needed.
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste the small log slice around the timestamp from `~/.copilot-relay/logs/copilot-relay.log`. Include the info request summary and any matching error entry. Do not paste debug logs unless reviewed.
      render: text
  - type: dropdown
    id: debug_enabled
    attributes:
      label: Was debug logging enabled?
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: true
  - type: dropdown
    id: preflight
    attributes:
      label: Did startup preflight pass?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that helps explain the issue.
