name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.0.2"
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  github-release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Build release assets
        shell: bash
        run: |
          mkdir -p release
          npm pack --pack-destination release
          (cd release && sha256sum *.tgz > SHA256SUMS)
      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${RELEASE_TAG}"
          current_commit="$(git rev-list -n 1 "$tag")"
          previous_tag="$(git describe --tags --abbrev=0 "${current_commit}^" 2>/dev/null || true)"
          if [ -n "$previous_tag" ]; then
            commit_range="${previous_tag}..${current_commit}"
          else
            commit_range="${current_commit}"
          fi
          commit_messages="$(git log --reverse --format='- %s' "$commit_range")"
          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          ## copilot-relay ${tag}

          Automated release for ${tag}.

          ### Commits
          ${commit_messages}

          ### Assets
          - npm package tarball
          - SHA256 checksums

          ### Validation
          - TypeScript typecheck
          - Unit tests
          - Integration tests with mocked Copilot upstream
          - Build
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file "$notes_file"
            gh release upload "$tag" release/*.tgz release/SHA256SUMS --clobber
          else
            gh release create "$tag" release/*.tgz release/SHA256SUMS \
              --title "$tag" \
              --notes-file "$notes_file"
          fi

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Use npm 11 for trusted publishing
        run: npm install --global npm@11
      - run: npm install --no-audit --no-fund
      - name: Publish to npm with trusted publishing
        shell: bash
        run: |
          unset NODE_AUTH_TOKEN NPM_CONFIG_USERCONFIG
          npm publish --access public

  publish-github:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
      - run: npm install --no-audit --no-fund
      - name: Publish to GitHub Packages
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          npm pkg set "name=@${owner}/copilot-relay"
          npm publish --access public --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
