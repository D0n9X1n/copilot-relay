name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.0.2"
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  github-release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Build release assets
        shell: bash
        run: |
          mkdir -p release
          npm pack --pack-destination release
          (cd release && sha256sum *.tgz > SHA256SUMS)
      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${RELEASE_TAG}"
          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          ## copilot-relay ${tag}

          Automated release for ${tag}.

          ### Assets
          - npm package tarball
          - SHA256 checksums

          ### Validation
          - TypeScript typecheck
          - Unit tests
          - Integration tests with mocked Copilot upstream
          - Build
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file "$notes_file"
            gh release upload "$tag" release/*.tgz release/SHA256SUMS --clobber
          else
            gh release create "$tag" release/*.tgz release/SHA256SUMS \
              --title "$tag" \
              --notes-file "$notes_file"
          fi

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install --no-audit --no-fund
      - name: Publish to npm
        if: env.NODE_AUTH_TOKEN != ''
        run: npm publish --access public
      - name: Skip npm publish without token
        if: env.NODE_AUTH_TOKEN == ''
        run: echo "NPM_TOKEN is not configured; skipping npm publish."

  publish-github:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
      - run: npm install --no-audit --no-fund
      - name: Publish to GitHub Packages
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          npm pkg set "name=@${owner}/copilot-relay"
          npm publish --access public --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
